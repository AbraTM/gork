name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs: 
  test:
    name: Test
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with: 
          go-version: '1.22'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...  

      - name: Build
        run: go build ./...   
        
      - name: Test with race detector
        run: go test -race -v -coverprofile=coverage.out ./...   
         
      - name: Show coverage
        run: go tool cover -func=coverage.out
