name: benchmark

on:
  push: 
    branches: [main]

jobs: 
  benchmark: 
    name: benchmark
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run benchmark
        run: go run cmd/benchmark/main.go
